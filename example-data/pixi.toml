[workspace]
name = "example-data-seeder"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "linux-aarch64"]

[dependencies]
python = "3.13.*"

[pypi-dependencies]
requests = "*"

[tasks]
seed = "python seed.py"
seed-lineages = "python seed.py covid-pango-lineages"
seed-all-lineages = "python seed.py covid-pango-lineages --limit 0"
seed-resistance = "python seed.py covid-resistance-mutations"

[feature.test.pypi-dependencies]
pytest = "*"
responses = "*"

[feature.test.tasks]
test = "pytest"

[environments]
test = { features = ["test"] }
